services:

  traefik:
    image: traefik:v2.11
    container_name: protosvpn-traefik
    restart: unless-stopped

    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=deploy_protosvpn-network"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

      - "--certificatesresolvers.letsencrypt.acme.email=dmitrynsu@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - protosvpn-network

  api:
    build:
      context: ../../api

    container_name: protosvpn-api
    restart: unless-stopped

    expose:
      - "8080"

    networks:
      - protosvpn-network

    labels:
    - "traefik.enable=true"

    - "traefik.http.routers.api.rule=Host(`protosvpn.novikoff.org`) && PathPrefix(`/api`)"

    - "traefik.http.routers.api.entrypoints=websecure"

    - "traefik.http.services.api.loadbalancer.server.port=8080"

    volumes:
      - ../vpn/data:/vpn-data:ro
      - ../vpn/data:/etc/openvpn
      
    env_file:
      - ../env/${ENV_FILE}

    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT}

  web:
    build:
      context: ../../web

    container_name: protosvpn-web
    restart: unless-stopped

    depends_on:
      - api

    labels:
      - "traefik.enable=true"

      - 'traefik.http.routers.web.rule=Host("protosvpn.novikoff.org")'
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.docker.network=deploy_protosvpn-network"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

    networks:
      - protosvpn-network

    env_file:
      - ../env/${ENV_FILE}

  postgres:
    image: postgres:16
    container_name: protosvpn-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    expose:
    - "5432"

    volumes:
    - postgres-data:/var/lib/postgresql/data

    networks:
    - protosvpn-network

  
      

  openvpn:
    image: kylemanna/openvpn

    container_name: protosvpn-openvpn
    restart: unless-stopped

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun

    ports:
      - "1194:1194/udp"

    volumes:
      - ../vpn/data:/etc/openvpn

    networks:
      - protosvpn-network

networks:
  protosvpn-network:
    driver: bridge

volumes:
  postgres-data: